<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <clipPath id="c">
      <circle cx="32" cy="32" r="29"/>
    </clipPath>
    <!-- Radial vignette gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a6178"/>
      <stop offset="100%" stop-color="#374d62"/>
    </radialGradient>
  </defs>

  <!-- Circle background with vignette -->
  <circle cx="32" cy="32" r="29" fill="url(#bg)" stroke="#2e4255" stroke-width="2"/>

  <g clip-path="url(#c)">
    <!-- Uncertainty band -->
    <path d="M10,48 Q32,18 54,16 Q32,46 10,48 Z"
          fill="rgba(220,230,240,0.2)" stroke="none"/>

    <!-- Dashed historical average line -->
    <line x1="10" y1="48" x2="54" y2="16"
          stroke="rgba(230,235,245,0.7)" stroke-width="2.2" stroke-dasharray="3,2.5"
          stroke-linecap="round"/>

    <!-- FY25 gray line -->
    <path d="M10,48 C28,52 44,30 54,16"
          fill="none" stroke="rgba(210,220,230,0.8)" stroke-width="2.4" stroke-linecap="round"/>

    <!-- Focal amber line -->
    <path d="M10,48 C28,56 50,46 54,16"
          fill="none" stroke="#e8a84c" stroke-width="2.6" stroke-linecap="round"/>

    <!-- Endpoint dot on the focal line -->
    <circle cx="54" cy="16" r="2.5" fill="#e8a84c"/>
  </g>
</svg>
